syntax = "proto3";

package assignment_reference_service;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/servicenow/assignment-reference-service/proto/assignment_reference_service";

service AssignmentReferenceService {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetGroup(GetGroupRequest) returns (GetGroupResponse);
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);
  rpc ListGroupMembers(ListGroupMembersRequest) returns (ListGroupMembersResponse);
  rpc ValidateUserExists(ValidateUserExistsRequest) returns (ValidateUserExistsResponse);
  rpc ValidateGroupExists(ValidateGroupExistsRequest) returns (ValidateGroupExistsResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse);
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc UpdateGroup(UpdateGroupRequest) returns (UpdateGroupResponse);
  rpc AddGroupMember(AddGroupMemberRequest) returns (AddGroupMemberResponse);
  rpc RemoveGroupMember(RemoveGroupMemberRequest) returns (RemoveGroupMemberResponse);
}

message GetUserRequest {
  string id = 1;
}

message GetUserResponse {
  User user = 1;
}

message ListUsersRequest {
  int32 page_size = 1;
  string page_token = 2;
  optional bool active_only = 3;
  optional string filter_display_name = 4;
  optional string filter_username = 5;
  optional string filter_email = 6;
}

message ListUsersResponse {
  repeated User items = 1;
  string next_page_token = 2;
}

message GetGroupRequest {
  string id = 1;
}

message GetGroupResponse {
  Group group = 1;
}

message ListGroupsRequest {
  int32 page_size = 1;
  string page_token = 2;
  optional bool active_only = 3;
  optional string filter_group_name = 4;
}

message ListGroupsResponse {
  repeated Group items = 1;
  string next_page_token = 2;
}

message ListGroupMembersRequest {
  string group_id = 1;
  int32 page_size = 2;
  string page_token = 3;
}

message ListGroupMembersResponse {
  repeated GroupMember items = 1;
  string next_page_token = 2;
}

message ValidateUserExistsRequest {
  string user_id = 1;
}

message ValidateUserExistsResponse {
  bool exists = 1;
}

message ValidateGroupExistsRequest {
  string group_id = 1;
}

message ValidateGroupExistsResponse {
  bool exists = 1;
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  string display_name = 3;
  bool is_active = 4;
}

message CreateUserResponse {
  User user = 1;
}

message UpdateUserRequest {
  string id = 1;
  optional string username = 2;
  optional string email = 3;
  optional string display_name = 4;
  optional bool is_active = 5;
}

message UpdateUserResponse {
  User user = 1;
}

message CreateGroupRequest {
  string group_name = 1;
  string description = 2;
  bool is_active = 3;
}

message CreateGroupResponse {
  Group group = 1;
}

message UpdateGroupRequest {
  string id = 1;
  optional string group_name = 2;
  optional string description = 3;
  optional bool is_active = 4;
}

message UpdateGroupResponse {
  Group group = 1;
}

message AddGroupMemberRequest {
  string group_id = 1;
  string user_id = 2;
  string member_role = 3;
}

message AddGroupMemberResponse {
  GroupMember member = 1;
}

message RemoveGroupMemberRequest {
  string group_id = 1;
  string user_id = 2;
}

message RemoveGroupMemberResponse {}

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  string display_name = 4;
  bool is_active = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
}

message Group {
  string id = 1;
  string group_name = 2;
  string description = 3;
  bool is_active = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GroupMember {
  string id = 1;
  string group_id = 2;
  string user_id = 3;
  string member_role = 4;
  google.protobuf.Timestamp created_at = 5;
}
