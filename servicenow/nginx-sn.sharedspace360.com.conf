# Nginx server block for sn.sharedspace360.com
# Run the app container with: docker run -p 8089:80 ...
# Then proxy this server to http://127.0.0.1:8089
# Install: copy to /etc/nginx/sites-available/ and symlink to sites-enabled, or include in http {}

server {
    listen 80;
    server_name sn.sharedspace360.com;

    location / {
        proxy_pass http://127.0.0.1:8089;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

